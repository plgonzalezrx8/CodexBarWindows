name: Windows CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore CodexBarWindows.sln

      - name: Build
        run: dotnet build CodexBarWindows.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test CodexBarWindows.sln --configuration Release --no-build

      - name: Collect core coverage
        run: >
          dotnet test Tests/CodexBarWindows.Core.Tests/CodexBarWindows.Core.Tests/CodexBarWindows.Core.Tests.csproj
          --configuration Release
          --no-build
          -p:CollectCoverage=true
          -p:CoverletOutputFormat=cobertura
          -p:CoverletOutput=TestResults/coverage/

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-coverage
          path: Tests/CodexBarWindows.Core.Tests/CodexBarWindows.Core.Tests/TestResults/coverage/
